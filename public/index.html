<!-- public/index.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Graph Render Engine</title>
  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre/cytoscape-dagre.js"></script>
  <link rel="icon" type="image/png" href="favIcon.png">
  <style>
    html,body { height:100%; margin:0; background:#000; font-family:Inter, Arial, sans-serif; }
    #controls {
      position: absolute; left:12px; top:12px; z-index:30;
      background: rgba(255,255,255,0.03); padding:8px; border-radius:8px;
      display:flex; gap:8px; align-items:center;
    }
    input[type=text]{ background:#111; color:#fff; border:1px solid #333; padding:6px 8px; border-radius:6px; min-width:420px; }
    button{ background:#222; color:#fff; padding:6px 10px; border-radius:6px; border:none; cursor:pointer; }
    #cy { width:100%; height:100%; }
    #jsonView {
      position:absolute; right:12px; top:12px; z-index:30;
      width:360px; max-height:90vh; overflow:auto;
      background: rgba(0,0,0,0.8); color:#00ff88; font-size:12px;
      padding:10px; border-radius:8px; font-family:monospace; white-space:pre-wrap;
    }
    #legend { position:absolute; left:12px; bottom:12px; z-index:30; color:#ddd; font-size:12px; background:rgba(0,0,0,0.5); padding:8px; border-radius:6px; }
  </style>
</head>
<body>
  <div id="controls">
  <input type="text" id="pathInput" placeholder="Caminho da pasta (ex: ./meuProjeto) ou link do GitHub" value="">    <button id="btnLoad">Analisar</button>
    <button id="btnExport">Export JSON</button>
    <button id="btnDb">Ver Banco</button>
  </div>

  <div id="jsonView">JSON será exibido aqui</div>
  <div id="legend">
  </div>

  <div id="cy"></div>

<script type="module" src="./renderer.js"></script>
</body>
</html>
